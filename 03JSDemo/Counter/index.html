<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counter App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#ff9248;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.wrapper{
    text-align:center;
}

.wrapper h1{
    color:white;
    font-size:3rem;
    font-weight:300;
    margin-bottom:20px;
    letter-spacing:1px;
}

.container{
    width:420px;
    background:#d9d9d9;
    padding:45px;
    border-radius:35px;
}

.counter-box{
    width:210px;
    height:140px;
    background:#ff9248;
    margin:0 auto 18px;
    border-radius:25px;

    display:flex;
    justify-content:center;
    align-items:center;
}

#count{
    color:white;
    font-size:4rem;
    font-weight:bold;
}

button{
    width:255px;
    height:50px;
    margin:10px auto;
    display:block;

    border:none;
    border-radius:30px;

    background:#ff9248;
    color:white;

    font-size:1.1rem;
    font-weight:bold;

    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.03);
}

button:active{
    transform:scale(.98);
}
</style>

</head>
<body>

<div class="wrapper">

    <h1>COUNTER</h1>

    <div class="container">

        <div class="counter-box">
            <p id="count">0</p>
        </div>

        <button id="incrementBtn">+ INCREMENT</button>
        <button id="decrementBtn">- DECREMENT</button>

    </div>

</div>

<script>
let count = localStorage.getItem("count")
    ? parseInt(localStorage.getItem("count"))
    : 0;

const countDisplay = document.getElementById("count");

countDisplay.textContent = count;

// Increment
document.getElementById("incrementBtn").addEventListener("click", () => {
    count++;
    countDisplay.textContent = count;
    localStorage.setItem("count", count);
});

// Decrement
document.getElementById("decrementBtn").addEventListener("click", () => {
    count--;
    countDisplay.textContent = count;
    localStorage.setItem("count", count);
});
</script>

</body>
</html>
